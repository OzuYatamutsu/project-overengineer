
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy-reader
  namespace: monitoring-plane

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy-pod-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - namespaces
    verbs:
      - get
      - list
      - watch

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy-pod-reader-binding
subjects:
  - kind: ServiceAccount
    name: alloy-reader
    namespace: monitoring-plane
roleRef:
  kind: ClusterRole
  name: alloy-pod-reader
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: monitoring-plane
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy-reader
      containers:
        - name: alloy
          image: grafana/alloy:v1.13.2
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: alloy-data
              mountPath: /var/lib/alloy
          resources:
            requests:
              cpu: "40m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            readOnlyRootFilesystem: true
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: alloy-data
          emptyDir: {}

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring-plane
data:
  config.alloy: |
    logging {
      level = "info"
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.process.logs.receiver]
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    loki.process "logs" {
      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://svc-loki.monitoring-plane.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

    prometheus.scrape "janitor" {
      targets = [
        { __address__ = "svc-janitor.default.svc.cluster.local:4000" },
      ]
      scrape_interval = "30s"
      forward_to = [prometheus.remote_write.mimir.receiver]
    }

    prometheus.scrape "ocrworker" {
      targets = [
        { __address__ = "svc-ocr-worker.default.svc.cluster.local:4000" },
      ]
      scrape_interval = "30s"
      forward_to = [prometheus.remote_write.mimir.receiver]
    }

    prometheus.scrape "statusapi" {
      targets = [
        { __address__ = "svc-status-api.default.svc.cluster.local:4000" },
      ]
      scrape_interval = "30s"
      forward_to = [prometheus.remote_write.mimir.receiver]
    }

    prometheus.scrape "projectoverengineerfe" {
      targets = [
        { __address__ = "svc-project-overengineer-fe.default.svc.cluster.local:3000" },
      ]
      metrics_path = "/api/metrics"
      scrape_interval = "30s"
      forward_to = [prometheus.remote_write.mimir.receiver]
    }

    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://svc-mimir.monitoring-plane.svc.cluster.local:8081/api/v1/push"

        headers = {
          "X-Scope-OrgID" = "default",
        }
      }
    }

    otelcol.receiver.otlp "tempogrpc" {
      protocols {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "svc-tempo.monitoring-plane.svc.cluster.local:4317"
        tls {
          insecure = true
        }
      }
    }

    otelcol.service "temposvc" {
        pipelines {
          traces {
            receivers = [otelcol.receiver.otlp.tempogrpc]
            exporters = [otelcol.exporter.otlp.tempo]
          }
        }
    }
