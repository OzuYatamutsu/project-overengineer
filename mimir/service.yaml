apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mimir
  namespace: monitoring-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
        - name: mimir
          image: grafana/mimir:2.17.7
          args:
            - "-activity-tracker.filepath="
            - "-blocks-storage.tsdb.dir=/var/mimir/tsdb"
            - "-blocks-storage.bucket-store.sync-dir=/var/mimir/tsdb-sync"
            - "-compactor.data-dir=/var/mimir/data-compactor"
            - "-ruler.rule-path=/var/mimir/data-ruler"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
          - name: mimir-data
            mountPath: /var/mimir
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
      volumes:
        - name: mimir-data
          emptyDir: {}

---

apiVersion: v1
kind: Service
metadata:
  name: svc-mimir
  namespace: monitoring-plane
spec:
  selector:
    app: mimir
  ports:
    - port: 8081
      targetPort: 8080
  type: ClusterIP
